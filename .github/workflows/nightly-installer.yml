name: Nightly Installer

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-installer
  cancel-in-progress: true

jobs:
  build-installer:
    name: Build installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure and build installer
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target steamvr_capture_installer --parallel

      - name: Rename installer with commit hash
        id: package
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          installers=(build/installer/SteamVRCaptureSetup-*.exe)
          if [ "${#installers[@]}" -eq 0 ]; then
            echo "No SteamVR Capture installer was generated." >&2
            exit 1
          fi

          installer="$(ls -t "${installers[@]}" | head -n 1)"
          asset_name="SteamVRCapture-${GITHUB_SHA::7}.exe"
          cp "$installer" "$asset_name"

          echo "installer_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "installer_path=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.installer_name }}
          path: ${{ steps.package.outputs.installer_path }}
          if-no-files-found: error

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="nightly"
          sha="${GITHUB_SHA}"
          asset_path="${{ steps.package.outputs.installer_path }}"
          notes="$(printf 'Automated nightly installer build.\n\nCommit: %s\n' "$sha")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$tag" "$sha"
          git push origin "refs/tags/$tag" --force

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "Nightly Build" --notes "$notes" --prerelease
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "Nightly Build" --notes "$notes" --prerelease --target "$sha"
          fi

          gh release upload "$tag" "$asset_path" --repo "$GITHUB_REPOSITORY" --clobber
